<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>分娩期アセスメント早見表</title>
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="分娩早見表">
<meta name="theme-color" content="#2FC7A8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#FFF6EA;
    --cream-deep:#FFEFDA;
    --ink:#2E2A45;
    --ink-soft:#6B6580;
    --card-bg:#FFFFFF;

    --coral:#FF6F5E;
    --coral-bg:#FFE3DE;
    --sky:#2FA0DB;
    --sky-bg:#DCF0FA;
    --mint:#1FB08E;
    --mint-bg:#D9F5EC;
    --violet:#8A6FE0;
    --violet-bg:#EAE2FC;
    --yellow:#FFB93F;
    --yellow-bg:#FFF1D6;
    --pink:#FF6FA5;
    --pink-bg:#FFE1EC;

    --shadow-sm: 0 3px 0 rgba(46,42,69,0.12);
    --shadow-card: 0 10px 0 rgba(46,42,69,0.08), 0 14px 30px rgba(46,42,69,0.10);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Noto Sans JP', sans-serif;
    color:var(--ink);
    background:
      radial-gradient(circle at 12% 18%, var(--cream-deep) 0, transparent 42%),
      radial-gradient(circle at 88% 8%, var(--cream-deep) 0, transparent 38%),
      radial-gradient(circle at 92% 92%, var(--cream-deep) 0, transparent 40%),
      var(--cream);
    min-height:100vh;
    padding: 22px 14px 60px;
  }
  .wrap{max-width:760px; margin:0 auto;}

  header{ margin-bottom:22px; text-align:left; }
  .badge{
    display:inline-flex;
    align-items:center;
    gap:6px;
    font-family:'Zen Maru Gothic', sans-serif;
    font-weight:700;
    font-size:12px;
    color:#fff;
    background:var(--coral);
    padding:6px 14px;
    border-radius:999px;
    box-shadow: var(--shadow-sm);
    margin-bottom:12px;
  }
  .badge .dot{width:6px;height:6px;border-radius:50%;background:#fff; opacity:.85;}
  h1{
    font-family:'Zen Maru Gothic', sans-serif;
    font-weight:900;
    font-size:28px;
    margin:0 0 8px;
    line-height:1.4;
    position:relative;
    display:inline-block;
  }
  h1 .wave{
    display:block;
    margin-top:2px;
  }
  .sub{
    font-size:13.5px;
    color:var(--ink-soft);
    font-weight:500;
    line-height:1.6;
  }

  .selector{
    display:grid;
    grid-template-columns: repeat(2, 1fr);
    gap:10px;
    margin-bottom:24px;
  }
  @media (min-width:560px){
    .selector{grid-template-columns: repeat(3, 1fr);}
  }
  .tab{
    background:var(--card-bg);
    border:none;
    border-radius:18px;
    padding:12px 12px 12px 12px;
    text-align:left;
    cursor:pointer;
    font-family:'Noto Sans JP', sans-serif;
    font-weight:700;
    font-size:14px;
    color:var(--ink);
    display:flex;
    align-items:center;
    gap:10px;
    box-shadow: var(--shadow-sm);
    transition: transform .12s ease, box-shadow .12s ease;
  }
  .tab .icon-dot{
    width:34px; height:34px; min-width:34px;
    border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-family:'Zen Maru Gothic', sans-serif;
    font-weight:900;
    font-size:14px;
    color:#fff;
  }
  .tab:hover{ transform: translateY(-2px); }
  .tab:active{ transform: translateY(1px); box-shadow:none; }
  .tab.active{
    outline: 3px solid var(--ink);
    outline-offset: 2px;
  }

  #panel-holder{ min-height:120px; }
  .placeholder{
    text-align:center;
    padding:50px 20px;
    color:var(--ink-soft);
    font-weight:600;
    font-size:13.5px;
    background: var(--card-bg);
    border-radius:20px;
    box-shadow: var(--shadow-sm);
  }

  .chart{
    background:var(--card-bg);
    border-radius:26px;
    box-shadow:var(--shadow-card);
    overflow:hidden;
    animation: pop-in .25s cubic-bezier(.2,.9,.3,1.2);
  }
  @keyframes pop-in{ from{opacity:0; transform:scale(0.96) translateY(6px);} to{opacity:1; transform:scale(1) translateY(0);} }

  .chart-head{
    padding:20px 22px 18px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
    background: linear-gradient(135deg, var(--coral), #FF9169);
  }
  .chart-head h2{
    font-family:'Zen Maru Gothic', sans-serif;
    font-size:22px;
    font-weight:900;
    margin:0;
    color:#fff;
  }
  .chart-head .tag{
    font-family:'Zen Maru Gothic', sans-serif;
    font-size:11px;
    font-weight:700;
    color:#fff;
    background:rgba(255,255,255,0.28);
    padding:5px 11px;
    border-radius:999px;
    white-space:nowrap;
  }

  .tracks{ padding:16px; display:flex; flex-direction:column; gap:12px; }
  .track{
    border-radius:18px;
    overflow:hidden;
  }
  .track-header{
    width:100%;
    display:flex;
    align-items:center;
    gap:12px;
    background:none;
    border:none;
    margin:0;
    padding:14px 16px 14px 14px;
    cursor:pointer;
    font:inherit;
    color:inherit;
    -webkit-tap-highlight-color: transparent;
  }
  .track .icon-dot{
    width:40px; height:40px;
    border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    flex-shrink:0;
  }
  .track .icon-dot svg{ width:20px; height:20px; }
  .track-title{
    font-family:'Zen Maru Gothic', sans-serif;
    font-weight:700;
    font-size:14px;
    margin:0;
    flex:1;
    text-align:left;
  }
  .chevron{
    display:flex;
    width:20px; height:20px;
    flex-shrink:0;
    color:var(--ink);
    opacity:0.4;
    transition:transform .25s ease;
  }
  .track.open .chevron{ transform:rotate(180deg); }
  .track-body{
    overflow:hidden;
    max-height:0;
    transition:max-height .3s ease;
  }
  .track-body-inner{
    padding:0 16px 16px 66px;
  }
  .track-body ul{
    margin:0; padding:0; list-style:none;
    display:flex; flex-direction:column; gap:6px;
  }
  .track-body li{
    font-size:13.5px;
    line-height:1.6;
    padding-left:16px;
    position:relative;
    font-weight:500;
  }
  .track-body li::before{
    content:"●";
    position:absolute; left:0; top:2px;
    font-size:6px;
    color:var(--ink-soft);
  }

  .t-cause{ background:var(--violet-bg); }
  .t-cause .icon-dot{ background:var(--violet); }
  .t-observe{ background:var(--sky-bg); }
  .t-observe .icon-dot{ background:var(--sky); }
  .t-effect{ background:var(--coral-bg); }
  .t-effect .icon-dot{ background:var(--coral); }
  .t-care{ background:var(--mint-bg); }
  .t-care .icon-dot{ background:var(--mint); }

  footer{
    margin-top:26px;
    text-align:center;
    font-size:11.5px;
    color:var(--ink-soft);
    font-weight:500;
  }
</style>
</head>
<body>
<div class="wrap">

</div>

const palColor = {
  coral:"var(--coral)", sky:"var(--sky)", mint:"var(--mint)",
  yellow:"var(--yellow)", violet:"var(--violet)", pink:"var(--pink)"
};

const selector = document.getElementById('selector');
const holder = document.getElementById('panel-holder');

DATA.forEach((item, i) => {
  const btn = document.createElement('button');
  const col = PALETTE[i % PALETTE.length];
  btn.className = 'tab';
  btn.dataset.key = item.key;
  btn.innerHTML = `<span class="icon-dot" style="background:${palColor[col]}">${i+1}</span><span>${item.title}</span>`;
  btn.addEventListener('click', () => selectItem(item.key, true));
  selector.appendChild(btn);
});

const CHEVRON = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>';

function selectItem(key, shouldScroll){
  const item = DATA.find(d => d.key === key);
  if(!item) return;

  document.querySelectorAll('.tab').forEach(t => {
    t.classList.toggle('active', t.dataset.key === key);
  });

  let tracksHtml = TRACKS.map(t => {
    const lis = item[t.key].map(li => `<li>${li}</li>`).join('');
    return `
      <div class="track ${t.cls}">
        <button class="track-header" type="button">
          <span class="icon-dot">${t.icon}</span>
          <span class="track-title">${t.label}</span>
          <span class="chevron">${CHEVRON}</span>
        </button>
        <div class="track-body">
          <div class="track-body-inner"><ul>${lis}</ul></div>
        </div>
      </div>
    `;
  }).join('');

  holder.innerHTML = `
    <div class="chart">
      <div class="chart-head">
        <h2>${item.title}</h2>
        <div class="tag">ASSESSMENT</div>
      </div>
      <div class="tracks">${tracksHtml}</div>
    </div>
  `;

  holder.querySelectorAll('.track-header').forEach(header => {
    header.addEventListener('click', () => {
      const track = header.closest('.track');
      const body = track.querySelector('.track-body');
      const isOpen = track.classList.contains('open');
      if(isOpen){
        body.style.maxHeight = '0px';
        track.classList.remove('open');
      } else {
        track.classList.add('open');
        body.style.maxHeight = body.scrollHeight + 'px';
      }
    });
  });

  if(shouldScroll){
    const chartEl = holder.querySelector('.chart');
    if(chartEl){
      setTimeout(() => {
        chartEl.scrollIntoView({behavior:'smooth', block:'start'});
      }, 50);
    }
  }
}

selectItem(DATA[0].key, false);
</script>
</body>
</html>
